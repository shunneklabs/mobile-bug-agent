name: Bug
description: Broken behavior, crash, regression, or wrong output.
title: "Bug: "
labels: ["type/bug", "status/needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What broke? Include exact observed behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen instead?
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Steps, command, device, or sample scenario.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - SDKOnly
        - Android
        - Notion
        - GitHub
        - Security / PII
        - KMP
        - Sample
        - Docs
        - Other
  - type: input
    id: version
    attributes:
      label: Version / Commit
      placeholder: "0.1.0-kotlinconf.1 or commit SHA"
